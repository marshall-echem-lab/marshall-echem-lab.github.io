# # # # # # # # # #
#   Marshall Lab  #
# # # # # # # # # #

# Basic
name:               "Marshall Lab"
title:              "Marshall Electrochemical Engineering Lab at the University of Canterbury"
description:        "The Marshall Lab is an electrochemical engineering research group at the University of Canterbury, Christchurch, New Zealand."


# URL
url:                https://marshall-echem-lab.github.io
baseurl:            
#baseurl:            "" #For Root Domain
permalink:          /:year/:month/:day/:title.html

# Markdown
markdown:           kramdown

# Highlighter
highlighter:        rouge

# Navigation
nav:
  - name:           "home"
    href:           "/"
  - name:           "about"
    href:           "/about"
  - name:           "publications"
    href:           "/publication"
  - name:           "people"
    href:           "/people"
  - name:           "join us"
    href:           "/join"
  - name:           "resources"
    href:           "/resources"
  - name:           "internal"
    href:           "/internal"
  # - name:           "blog"
    # href:           "/blog"
#   - name:           "abstracts"
#     href:           "/abstracts"
  - name:           "lab teachings"
    href:           "/presentations"

# Sass
sass:
  style:            :compressed

# Scopes
defaults:
  -
    scope:
      path:         ""
      type:         "pages"
    values:
      layout:       "page"
  -
    scope:
      path:         ""
      type:         "posts"
    values:
      layout:       "post"
  -
    scope:
      path:         ""
      type:         "people"
    values:
      layout:       "profile"


collections:
  people:
    output: true
    permalink: /people/:title/index.html
